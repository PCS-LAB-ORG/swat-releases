name: Lint

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: HTMLHint
        run: npx htmlhint --config .htmlhintrc 'index.html' 'cortex-catalyst/*.html' 'cortex-search-pipeline/*.html'

      - name: Markdownlint
        run: npx markdownlint-cli2 '**/*.md' '!node_modules/**' '!session-summaries/**'

      - name: ESLint
        run: npx eslint . --no-error-on-unmatched-pattern

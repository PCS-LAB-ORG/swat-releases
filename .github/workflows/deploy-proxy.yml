name: Deploy Proxy

on:
  push:
    branches: [main]
    paths:
      - 'gateway/**'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: pcs-swat-resources
  REGION: us-central1
  AR_REPO: swat-releases
  IMAGE_NAME: proxy
  MIG_NAME: mig-swat-releases
  MIG_HEALTH_CHECK: auth-gateway-health
  BACKEND_URL: https://storage.googleapis.com/swat-releases-serve
  SERVE_BUCKET: swat-releases-serve
  INPUT_BUCKET: swat-releases-input
  UPLOAD_TOOL_IDS: cortex-catalyst,cortex-insights,cortex-unity,ai-sweeper,cortex-search-pipeline,session-planner
  VM_MACHINE_TYPE: e2-small
  VM_NETWORK: pcs-swat-resources
  VM_SUBNET: cloudrun-testing
  VM_SERVICE_ACCOUNT: swat-releases-pipeline@pcs-swat-resources.iam.gserviceaccount.com
  WIF_PROVIDER: projects/855530889800/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: swat-releases-pipeline@pcs-swat-resources.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_ENV
          echo "TEMPLATE_NAME=swat-releases-proxy-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build and push image (linux/amd64 for COS)
        run: |
          docker buildx create --use --name amd64-builder 2>/dev/null || docker buildx use amd64-builder 2>/dev/null || true
          docker buildx build \
            --platform linux/amd64 \
            -f gateway/Dockerfile \
            -t ${{ env.IMAGE_URI }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}:latest \
            --push \
            ./gateway

      - name: Generate cloud-init
        run: |
          cat > /tmp/cloud-init.yaml << 'CLOUDINIT'
          #cloud-config
          write_files:
            - path: /etc/systemd/system/swat-releases-proxy.service
              permissions: "0644"
              owner: root
              content: |
                [Unit]
                Description=swat-releases GCS static site proxy
                Wants=gcr-online.target
                After=gcr-online.target

                [Service]
                Environment="HOME=/tmp"
                ExecStartPre=/usr/bin/docker-credential-gcr configure-docker --registries=REGION-docker.pkg.dev
                ExecStartPre=-/usr/bin/docker stop swat-releases-proxy
                ExecStartPre=-/usr/bin/docker rm swat-releases-proxy
                ExecStart=/usr/bin/docker run \
                  --name=swat-releases-proxy \
                  --log-driver=gcplogs \
                  --log-opt gcp-project=pcs-swat-resources \
                  -p 8080:8080 \
                  -e BACKEND_URL=BACKEND_URL_PLACEHOLDER \
                  -e SERVE_BUCKET=SERVE_BUCKET_PLACEHOLDER \
                  -e INPUT_BUCKET=INPUT_BUCKET_PLACEHOLDER \
                  -e UPLOAD_TOOL_IDS=UPLOAD_TOOL_IDS_PLACEHOLDER \
                  IMAGE_URI_PLACEHOLDER
                ExecStop=/usr/bin/docker stop swat-releases-proxy
                ExecStopPost=/usr/bin/docker rm swat-releases-proxy
                Restart=always
                RestartSec=10

                [Install]
                WantedBy=multi-user.target

          runcmd:
            - systemctl daemon-reload
            - systemctl start swat-releases-proxy.service
          CLOUDINIT
          sed -i "s|REGION|${{ env.REGION }}|g" /tmp/cloud-init.yaml
          sed -i "s|BACKEND_URL_PLACEHOLDER|${{ env.BACKEND_URL }}|g" /tmp/cloud-init.yaml
          sed -i "s|SERVE_BUCKET_PLACEHOLDER|${{ env.SERVE_BUCKET }}|g" /tmp/cloud-init.yaml
          sed -i "s|INPUT_BUCKET_PLACEHOLDER|${{ env.INPUT_BUCKET }}|g" /tmp/cloud-init.yaml
          sed -i "s|UPLOAD_TOOL_IDS_PLACEHOLDER|${{ env.UPLOAD_TOOL_IDS }}|g" /tmp/cloud-init.yaml
          sed -i "s|IMAGE_URI_PLACEHOLDER|${{ env.IMAGE_URI }}|g" /tmp/cloud-init.yaml

      - name: Create instance template (idempotent)
        run: |
          if gcloud compute instance-templates describe ${{ env.TEMPLATE_NAME }} \
              --project=${{ env.PROJECT_ID }} &>/dev/null; then
            echo "Template ${{ env.TEMPLATE_NAME }} already exists ŌĆö skipping."
          else
            gcloud compute instance-templates create ${{ env.TEMPLATE_NAME }} \
              --project=${{ env.PROJECT_ID }} \
              --machine-type=${{ env.VM_MACHINE_TYPE }} \
              --image-family=cos-stable \
              --image-project=cos-cloud \
              --network=${{ env.VM_NETWORK }} \
              --subnet=${{ env.VM_SUBNET }} \
              --region=${{ env.REGION }} \
              --service-account=${{ env.VM_SERVICE_ACCOUNT }} \
              --scopes=cloud-platform \
              --tags=allow-health-checks,cloudrun-gateway \
              --boot-disk-size=10GB \
              --boot-disk-type=pd-balanced \
              --metadata-from-file user-data=/tmp/cloud-init.yaml \
              --labels="app=swat-releases,component=proxy,commit-sha=${{ env.IMAGE_TAG }}"
          fi


      - name: Create or update MIG
        run: |
          if ! gcloud compute instance-groups managed describe ${{ env.MIG_NAME }} \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} &>/dev/null; then
            echo "MIG does not exist ŌĆö creating."
            gcloud compute instance-groups managed create ${{ env.MIG_NAME }} \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --template=${{ env.TEMPLATE_NAME }} \
              --size=1 \
              --health-check=${{ env.MIG_HEALTH_CHECK }} \
              --initial-delay=60s
            gcloud compute instance-groups managed set-named-ports ${{ env.MIG_NAME }} \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --named-ports=http:8080
          else
            echo "MIG exists ŌĆö rolling out new template."
            gcloud compute instance-groups managed rolling-action start-update ${{ env.MIG_NAME }} \
              --project=${{ env.PROJECT_ID }} \
              --region=${{ env.REGION }} \
              --version=template=projects/${{ env.PROJECT_ID }}/global/instanceTemplates/${{ env.TEMPLATE_NAME }} \
              --type=proactive \
              --minimal-action=replace \
              --max-unavailable=4 \
              --max-surge=0
          fi

      - name: Wait for rollout
        run: |
          gcloud compute instance-groups managed wait-until ${{ env.MIG_NAME }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --stable \
            --timeout=600

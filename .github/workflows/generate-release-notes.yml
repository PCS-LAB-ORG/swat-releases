name: Generate Release Notes

on:
  schedule:
    - cron: '0 6 * * *'     # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force re-process a specific version (e.g. 26.7.1). Skip logic bypassed.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  id-token: write            # WIF

env:
  WIF_PROVIDER: projects/855530889800/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: swat-releases-pipeline@pcs-swat-resources.iam.gserviceaccount.com
  GOOGLE_CLOUD_PROJECT: pcs-swat-resources
  GOOGLE_CLOUD_LOCATION: global
  GOOGLE_GENAI_USE_ENTERPRISE: "True"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch tokens from Secret Manager
        id: get-tokens
        run: |
          ORG_TOKEN=$(gcloud secrets versions access latest \
            --secret=svc-pcs-lab-GitHub-Org-Access-Token \
            --project=855530889800 | tr -d '[:space:]')
          echo "::add-mask::$ORG_TOKEN"
          echo "org_token=$ORG_TOKEN" >> $GITHUB_OUTPUT

          PR_TOKEN=$(gcloud secrets versions access latest \
            --secret=svc-pcs-lab-github-swat-releases-actions-token \
            --project=855530889800 | tr -d '[:space:]')
          echo "::add-mask::$PR_TOKEN"
          echo "pr_token=$PR_TOKEN" >> $GITHUB_OUTPUT

      - name: Poll for new releases
        id: poll
        env:
          GITHUB_TOKEN: ${{ steps.get-tokens.outputs.org_token }}
          INPUT_FORCE_VERSION: ${{ inputs.force_version }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/poll.py

      - name: Generate release notes per version
        if: steps.poll.outputs.new_versions != ''
        env:
          GITHUB_TOKEN: ${{ steps.get-tokens.outputs.org_token }}
          GH_TOKEN: ${{ steps.get-tokens.outputs.pr_token }}
          NEW_VERSIONS: ${{ steps.poll.outputs.new_versions }}
          FORCE_VERSION: ${{ inputs.force_version }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          for VERSION in $NEW_VERSIONS; do
            echo "::group::Processing Cortex Catalyst $VERSION"

            git checkout main
            git pull origin main
            BRANCH="auto/release-notes/cortex-catalyst-$VERSION"
            git checkout -b "$BRANCH"

            # Stage 1: extract JSON artifact via Gemini
            FORCE_FLAG=""
            if [ -n "$FORCE_VERSION" ]; then
              FORCE_FLAG="--force"
            fi
            python scripts/extract.py cortex-catalyst "$VERSION" $FORCE_FLAG

            # Stage 2: render HTML and update index.html
            python scripts/render.py cortex-catalyst "$VERSION"

            # Commit
            git add "data/cortex-catalyst/$VERSION.json" \
                    "cortex-catalyst/$VERSION.html" \
                    "cortex-catalyst/"*.html \
                    "index.html"
            git commit -m "auto: Cortex Catalyst $VERSION release notes [skip ci]"
            git push --force origin "$BRANCH"

            # Create PR and auto-merge
            PR_BODY=$(python scripts/pr_body.py "data/cortex-catalyst" "$VERSION")
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "auto: Cortex Catalyst $VERSION release notes" \
              --body "$PR_BODY"
            gh pr merge "$BRANCH" --merge --auto

            git checkout main
            echo "::endgroup::"
          done
